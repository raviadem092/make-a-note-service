trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  nodeVersion: "22.x"
  azureServiceConnection: "make-a-note"
  webAppName: "make-a-note-service-dev"

stages:
  - stage: BuildAndTest
    displayName: "Build and Test"

    jobs:
      - job: Build
        displayName: "Install, Test and Package"

        pool:
          vmImage: "ubuntu-latest"

        steps:
          - task: NodeTool@0
            displayName: "Use Node.js 22"
            inputs:
              versionSpec: "$(nodeVersion)"

          - script: |
              npm ci
            displayName: "Install Dependencies"

          - script: |
              npm run test:ci
            displayName: "Run Unit & Integration Tests"

          - task: PublishTestResults@2
            displayName: "Publish Test Results"
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "**/test-results/junit.xml"
              failTaskOnFailedTests: true
              testRunTitle: "Jest Test Results"

          - task: ArchiveFiles@2
            displayName: "Create Deployment Package"
            inputs:
              rootFolderOrFile: "$(System.DefaultWorkingDirectory)"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"
              replaceExistingArchive: true

          - publish: "$(Build.ArtifactStagingDirectory)/app.zip"
            artifact: drop
            displayName: "Publish Deployment Artifact"

  - stage: QualityGate
    displayName: "Quality Gate"
    dependsOn: BuildAndTest
    condition: succeeded()

    jobs:
      - job: Validation
        displayName: "Validate Quality"

        pool:
          vmImage: "ubuntu-latest"

        steps:
          - script: |
              echo "Quality checks passed"
            displayName: "Quality Gate Validation"

  - stage: Deploy
    displayName: "Deploy to Azure"
    dependsOn: QualityGate
    condition: succeeded()

    jobs:
      - deployment: Deploy
        displayName: "Deploy to Azure App Service"
        environment: production

        pool:
          vmImage: "ubuntu-latest"

        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop

                - task: AzureWebApp@1
                  displayName: "Deploy to Azure App Service"
                  inputs:
                    azureSubscription: "$(azureServiceConnection)"
                    appType: "webAppLinux"
                    appName: "$(webAppName)"
                    runtimeStack: "NODE|22-lts"
                    package: "$(Pipeline.Workspace)/drop/app.zip"
